<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plan żywieniowy</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Plan">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1a2e'/%3E%3Ccircle cx='50' cy='50' r='24' fill='none' stroke='%23e0e0e0' stroke-width='2.5'/%3E%3Cpath d='M20 32v36M16 32v12a4 4 0 008 0V32' fill='none' stroke='%23e0e0e0' stroke-width='2.5' stroke-linecap='round'/%3E%3Cpath d='M80 32c4 0 6 4 6 10s-2 10-6 10v16' fill='none' stroke='%23e0e0e0' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E">
<meta name="theme-color" content="#1a1a2e">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='24' fill='none' stroke='%23e0e0e0' stroke-width='2.5'/%3E%3Cpath d='M20 32v36M16 32v12a4 4 0 008 0V32' fill='none' stroke='%23e0e0e0' stroke-width='2.5' stroke-linecap='round'/%3E%3Cpath d='M80 32c4 0 6 4 6 10s-2 10-6 10v16' fill='none' stroke='%23e0e0e0' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Plan%20%C5%BCywieniowy%22%2C%22short_name%22%3A%22Plan%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231a1a2e%22%2C%22theme_color%22%3A%22%231a1a2e%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ctext%20y%3D'.9em'%20font-size%3D'90'%3E%F0%9F%8D%BD%EF%B8%8F%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22any%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head><body>

<div style="position:relative">
<h1>🍽️ Plan 21–24.04 <span class="sync-dot loading" id="syncDot"></span></h1>
<button class="person-icon" id="personBtn" onclick="togglePerson()"></button>
</div>
<div class="target" id="targetBar"><span>🎯 2000 kcal | B 150g | W 182g | T 70g</span></div>

<div id="personPrompt" class="person-prompt" style="display:none">
<h2>Kto jesz?</h2>
<button onclick="setPerson('on')">🧔 On</button>
<button onclick="setPerson('ona')">👩 Ona</button>
</div>

<div id="planView" class="view active"><div id="days"></div></div>

<div id="shopView" class="view">
<div class="shop open" id="shop" style="display:block">
<div class="shop-head"><h2>🛒 Lista zakupów</h2></div>
<form class="p-form" onsubmit="return addShopItem(this)"><input name="item" placeholder="Dodaj produkt..." required><button type="submit">+</button></form>
<div class="shop-progress" id="prog"></div>
<div id="shopList"></div>
<div style="text-align:center;padding:24px 0 8px"><button onclick="clearShop()" style="background:none;border:1px solid #333;color:#666;font-size:.7em;cursor:pointer;border-radius:6px;padding:6px 16px">🗑️ wyczyść zaznaczenia</button></div>
<div class="sync" id="syncStatus"></div>
</div>
</div>

<div id="pantryView" class="view">
<div class="pantry open" id="pantry" style="display:block">
<div class="shop-head"><h2>📦 Spiżarnia</h2></div>
<form class="p-form" onsubmit="return addPantryItem(this)"><input name="item" placeholder="Produkt" required><input name="qty" placeholder="Ilość"><input name="exp" type="date" placeholder="Ważność"><button type="submit">+</button></form>
<div id="pantryList"></div>
<div style="text-align:center;padding:24px 0 8px"><button onclick="consumePlan()" style="background:none;border:1px solid #333;color:#f4a261;font-size:.75em;cursor:pointer;border-radius:6px;padding:6px 16px">🔄 Rozlicz plan (odejmij z spiżarni)</button></div>
<div class="sync" id="syncStatus2"></div>
</div>
</div>

<div id="recipesView" class="view">
<input class="r-search" id="rSearch" type="text" placeholder="🔍 Szukaj przepisu..." oninput="searchRecipes(this.value)">
<div class="r-filter" id="rSource">
<button class="active" onclick="filterSource('base')">📚 Baza</button>
<button onclick="filterSource('insp')">💡 Inspiracje</button>
<button onclick="filterSource('user')">✏️ Własne</button>
<button onclick="filterSource('all')">Wszystkie</button>
</div>
<div class="r-filter" id="rFilter">
<button class="active" onclick="filterRecipes('all')">Wszystkie</button>
<button onclick="filterRecipes('b')">🥣</button>
<button onclick="filterRecipes('sb')">🥞</button>
<button onclick="filterRecipes('d')">🍲</button>
<button onclick="filterRecipes('s')">🥗</button>
</div>
<div style="text-align:right;padding:4px 0"><button onclick="openAddRecipe()" style="background:#2d6a4f;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:.8em;cursor:pointer">+ Nowy przepis</button></div>
<div class="r-list" id="rList"></div>
</div>

<div class="swap-bar" id="swapBar">
<span id="swapMsg">Wybierz drugi posiłek do zamiany</span><br>
<button onclick="openRecipePicker()">📋 Z bazy</button>
<button onclick="clearMeal()">🗑️ Wyczyść</button>
<button class="cancel" onclick="cancelSwap()">✕ Anuluj</button>
</div>

<div class="modal" id="recipePicker">
<div class="shop-head"><h3 id="pickerTitle">Zamień na:</h3><button class="shop-close" onclick="closeRecipePicker()">✕</button></div>
<div id="recipeList"></div>
</div>

<div class="r-detail" id="rDetail"></div>

<nav class="bnav" id="bnav">
<button class="active" onclick="switchTab('plan')"><span class="bi">📅</span>Plan</button>
<button onclick="switchTab('shop')"><span class="bi">🛒</span>Zakupy</button>
<button onclick="switchTab('pantry')"><span class="bi">📦</span>Spiżarnia</button>
<button onclick="switchTab('recipes')"><span class="bi">📖</span>Przepisy</button>
</nav>

<script type="module" src="js/app.js"></script>
</body></html>
