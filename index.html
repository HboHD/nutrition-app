// --- Get meal (with overrides) ---
function getMeal(pos,slot){
var k=dayOrder[pos]+'_'+slot;
if(mealOverrides[k]){
var o=mealOverrides[k];
if(Array.isArray(o))return DAYS[o[0]].meals[o[1]];
return o;
}
return DAYS[dayOrder[pos]].meals[slot];
}

// --- Render days ---
function renderDays(){
var c=document.getElementById('days');
// preserve open state
var openSet={};
c.querySelectorAll('.day-content.open').forEach(function(el){
var day=el.parentElement;if(day&&day.dataset.pos!=null)openSet[day.dataset.pos]=1;
});
if(!Object.keys(openSet).length)openSet[0]=1;// default: first day open
c.innerHTML='';
dayOrder.forEach(function(di,pos){
var d=DAYS[di],el=document.createElement('div');
el.className='day';el.dataset.pos=pos;
var meals='',dt=[0,0,0,0];
for(var s=0;s<d.meals.length;s++){
var ml=getMeal(pos,s);
for(var mi=0;mi<4;mi++)dt[mi]+=ml.m[mi];
var tg=ml.tag?(' <span class="tag '+ml.tagClass+'">'+ml.tag+'</span>'):'';
var sel=(selected&&selected.pos===pos&&selected.slot===s)?' selected':'';
meals+='<div class="meal'+sel+'" onclick="selectMeal('+pos+','+s+')"><div class="meal-name">'+ml.name+tg+'</div><div class="ingredients">'+(ml.ing||'')+'</div><div class="macros">'+
['kcal','białko','węgle','tłuszcz'].map(function(l,i){return'<div class="macro"><span class="val">'+ml.m[i]+'</span><span class="lbl">'+l+'</span></div>'}).join('')+'</div></div>';
}
var isOpen=openSet[pos]?' open':'';
var target=2000;
var treatMax=Math.min(Math.floor(target*0.15),Math.max(0,target-dt[0]));
var treatTxt=treatMax>0?'🍬 ~'+treatMax+' kcal (~'+Math.floor(treatMax/160*30)+'g czipsów / '+Math.floor(treatMax/135)+' rządków czekolady / '+Math.floor(treatMax/25)+' cukierków)':'🍬 brak budżetu';
el.innerHTML='<div class="day-header" onclick="toggle(this)"><span class="drag-handle">⠿</span><span>'+d.hdr+'</span><span>▼</span></div>'+
'<div class="day-content'+isOpen+'">'+meals+
'<div class="summary">'+
'<div class="sum-row"><span class="sum-label"></span><div class="sum-vals"><span>kcal</span><span>B</span><span>W</span><span>T</span></div></div>'+
'<div class="sum-row"><span class="sum-label">Baza</span><div class="sum-vals">'+dt.map(function(n,j){return'<span><b>'+n+'</b>'+(j>0?'g':'')+'</span>'}).join('')+'</div></div>'+
'</div><div class="treat">'+treatTxt+'</div></div>';
initDrag(el);c.appendChild(el);
});
}

function toggle(hdr){hdr.nextElementSibling.classList.toggle('open')}

// --- Drag & drop ---
var dragged=null;
function initDrag(el){
var h=el.querySelector('.drag-handle');
h.addEventListener('pointerdown',function(e){
e.preventDefault();e.stopPropagation();dragged=el;el.classList.add('dragging');
var moveHandler=function(ev){
var tgt=document.elementFromPoint(ev.clientX,ev.clientY);
if(tgt){var day=tgt.closest('.day');
document.querySelectorAll('.day').forEach(function(d){d.classList.remove('drag-over')});
if(day&&day!==dragged)day.classList.add('drag-over');}
};
var upHandler=function(ev){
document.removeEventListener('pointermove',moveHandler);
document.removeEventListener('pointerup',upHandler);
el.classList.remove('dragging');
var tgt=document.elementFromPoint(ev.clientX,ev.clientY);
if(tgt){var day=tgt.closest('.day');
if(day&&day!==dragged){
var from=+dragged.dataset.pos,to=+day.dataset.pos;
var item=dayOrder.splice(from,1)[0];dayOrder.splice(to,0,item);
renderDays();saveState('day_order',dayOrder);
}}
document.querySelectorAll('.day').forEach(function(d){d.classList.remove('drag-over')});
dragged=null;
};
document.addEventListener('pointermove',moveHandler);
document.addEventListener('pointerup',upHandler);
});
}

var name=shopItem.split(' — ')[0].toLowerCase();
return pantry.some(function(p){return name.indexOf(p.item.toLowerCase())>=0||p.item.toLowerCase().indexOf(name)>=0});
}

}

h+='<div class="dept"><div class="dept-name">✏️ Dodane ręcznie</div>';
customShopItems.forEach(function(ci,i){
total++;if(ci.checked)done++;
h+='<div class="item'+(ci.checked?' done':'')+'"><input type="checkbox"'+(ci.checked?' checked':'')+' onchange="ckCustom('+i+',this)"><label>'+ci.item+'</label><button class="p-del" onclick="delShopItem('+i+')">✕</button></div>';
});h+='</div>';
}
if(!h)h='<div style="color:#666;text-align:center;padding:20px">Lista pusta</div>';
document.getElementById('shopList').innerHTML=h;
document.getElementById('prog').textContent=total?done+' / '+total+' ✓':'';
}
function addShopItem(form){
var d=new FormData(form);
customShopItems.push({item:d.get('item'),checked:false});
form.reset();renderShop();saveState('custom_shop',customShopItems);return false;
}
function ckCustom(i,el){
customShopItems[i].checked=el.checked;
renderShop();saveState('custom_shop',customShopItems);
}
function delShopItem(i){customShopItems.splice(i,1);renderShop();saveState('custom_shop',customShopItems)}
function clearShop(){if(!confirm('Wyczyścić zaznaczenia? Ręcznie dodane produkty zostaną.'))return;shopCleared=true;shopChecked={};saveState('shopping',shopChecked);saveState('shop_cleared',{cleared:true});renderShop()}
function ck(k,el){
if(el.checked){
shopChecked[k]=1;
// Auto-add long-term items to pantry
var parts=k.split('_'),di=+parts[0],ii=+parts[1];
if(LONG_TERM[di]||LONG_TERM_ITEMS[k]){
var itemName=SHOP[di][1][ii].split(' — ')[0];
var qty=SHOP[di][1][ii].split(' — ')[1]||'';
var existing=pantry.find(function(p){return p.item===itemName});
if(existing){existing.qty=qty;existing.exp=''}
else{pantry.push({item:itemName,qty:qty,exp:''})}
saveState('pantry',pantry);
}
}else{delete shopChecked[k]}
el.parentElement.classList.toggle('done',el.checked);
renderShop();saveState('shopping',shopChecked);
}
function shopToggle(){
if(document.getElementById('shop').classList.contains('open')){shopClose();return}
pantryClose();document.getElementById('shop').classList.add('open');renderShop()
}
function shopClose(){document.getElementById('shop').classList.remove('open')}

// --- Meal selection & swap ---
function selectMeal(pos,slot){
if(!selected){
selected={pos:pos,slot:slot};
document.getElementById('swapBar').classList.add('show');
document.getElementById('swapMsg').textContent=getMeal(pos,slot).name;
renderDays();return;
}
if(selected.pos===pos&&selected.slot===slot){cancelSwap();return}
// Swap meals
var kA=dayOrder[selected.pos]+'_'+selected.slot,kB=dayOrder[pos]+'_'+slot;
var mA=getMeal(selected.pos,selected.slot),mB=getMeal(pos,slot);
var origA=mealOverrides[kA]||[dayOrder[selected.pos],selected.slot];
var origB=mealOverrides[kB]||[dayOrder[pos],slot];
mealOverrides[kA]=Array.isArray(origB)?origB:{name:mB.name,m:mB.m,ing:mB.ing||''};
mealOverrides[kB]=Array.isArray(origA)?origA:{name:mA.name,m:mA.m,ing:mA.ing||''};
selected=null;document.getElementById('swapBar').classList.remove('show');
renderDays();saveState('meal_overrides',mealOverrides);
}
function cancelSwap(){selected=null;document.getElementById('swapBar').classList.remove('show');renderDays()}

// --- Recipe picker ---
function openRecipePicker(){
if(!selected)return;
var slot=SLOTS[selected.slot];
var current=getMeal(selected.pos,selected.slot);
var all=getAllRecipes().filter(function(r){return r.slot===slot});
var h='';
all.forEach(function(r){
var diff=['kcal','B','W','T'].map(function(l,i){
var d=r.m[i]-current.m[i];
return'<span class="'+(d>=0?'ro-plus':'ro-minus')+'">'+(d>=0?'+':'')+d+' '+l+'</span>';
}).join(' ');
h+='<div class="recipe-opt" onclick="pickRecipe(\''+r.id+'\')"><div class="ro-name">'+r.name+'</div><div class="ro-macros"><span>'+r.m[0]+' kcal</span><span>B:'+r.m[1]+'</span><span>W:'+r.m[2]+'</span><span>T:'+r.m[3]+'</span></div><div class="ro-diff">vs obecny: '+diff+'</div></div>';
});
document.getElementById('recipeList').innerHTML=h;
document.getElementById('recipePicker').classList.add('open');
}
function pickRecipe(id){
var r=getAllRecipes().find(function(x){return x.id===id});
if(!r||!selected)return;
var k=dayOrder[selected.pos]+'_'+selected.slot;
mealOverrides[k]={name:r.name,m:r.m,ing:''};
closeRecipePicker();cancelSwap();
renderDays();saveState('meal_overrides',mealOverrides);
}
function closeRecipePicker(){document.getElementById('recipePicker').classList.remove('open')}

// --- Pantry ---
function renderPantry(){
var h='';
var sorted=pantry.slice().sort(function(a,b){return(a.exp||'9').localeCompare(b.exp||'9')});
sorted.forEach(function(p,i){
var idx=pantry.indexOf(p);
var expStr='',expClass='';
if(p.exp){
var diff=Math.ceil((new Date(p.exp)-new Date())/(1000*60*60*24));
expStr=diff<=0?'przeterminowane!':diff<=2?'za '+diff+'d!':'do '+p.exp;
expClass=diff<=2?' p-exp':'';
}
h+='<div class="p-item"><div class="p-info"><span class="p-name">'+p.item+'</span>'+(p.qty?' · '+p.qty:'')+'<br><span class="p-meta'+expClass+'">'+(expStr||'brak daty')+'</span></div><button class="p-del" onclick="delPantry('+idx+')">✕</button></div>';
});
document.getElementById('pantryList').innerHTML=h||'<div style="color:#666;text-align:center;padding:20px">Spiżarnia pusta</div>';
}
function addPantryItem(form){
var d=new FormData(form);
pantry.push({item:d.get('item'),qty:d.get('qty')||'',exp:d.get('exp')||''});
form.reset();renderPantry();saveState('pantry',pantry);return false;
}
function delPantry(i){pantry.splice(i,1);renderPantry();saveState('pantry',pantry)}
function pantryToggle(){
if(document.getElementById('pantry').classList.contains('open')){pantryClose();return}
shopClose();document.getElementById('pantry').classList.add('open');renderPantry()
}
function pantryClose(){document.getElementById('pantry').classList.remove('open')}

// --- Supabase sync ---
var saveTimer={};
function showSync(msg){
['syncStatus','syncStatus2'].forEach(function(id){
var el=document.getElementById(id);if(el)el.textContent=msg;
});
setTimeout(function(){['syncStatus','syncStatus2'].forEach(function(id){
var el=document.getElementById(id);if(el)el.textContent='';
})},2000);
}
function saveState(key,val){
clearTimeout(saveTimer[key]);
saveTimer[key]=setTimeout(function(){
sb.from('app_state').upsert({key:key,value:val,updated_at:new Date().toISOString()})
.then(function(res){if(res.error)showSync('⚠ błąd zapisu');else showSync('✓ zsynchronizowano')})
.catch(function(){showSync('⚠ brak sieci')});
},300);
}

async function loadState(){
var{data}=await sb.from('app_state').select('*');
if(data)data.forEach(function(r){
if(r.key==='day_order'&&r.value&&r.value.length)dayOrder=r.value;
if(r.key==='shopping'&&r.value)shopChecked=r.value;
if(r.key==='pantry'&&Array.isArray(r.value))pantry=r.value;
if(r.key==='meal_overrides'&&r.value)mealOverrides=r.value;
if(r.key==='custom_shop'&&Array.isArray(r.value))customShopItems=r.value;
if(r.key==='shop_cleared'&&r.value)shopCleared=!!r.value.cleared;
if(r.key==='recipe_edits'&&r.value)recipeEdits=r.value;
if(r.key==='user_recipes'&&Array.isArray(r.value))userRecipes=r.value;
});
renderDays();
}

// Realtime
sb.channel('sync').on('postgres_changes',{event:'*',schema:'public',table:'app_state'},function(p){
var r=p.new;
if(r.key==='day_order'&&r.value&&r.value.length){dayOrder=r.value;renderDays()}
if(r.key==='shopping'&&r.value){shopChecked=r.value;if(document.getElementById('shop').classList.contains('open'))renderShop()}
if(r.key==='pantry'&&Array.isArray(r.value)){pantry=r.value;if(document.getElementById('pantry').classList.contains('open'))renderPantry();if(document.getElementById('shop').classList.contains('open'))renderShop()}
if(r.key==='meal_overrides'&&r.value){mealOverrides=r.value;renderDays()}
if(r.key==='custom_shop'&&Array.isArray(r.value)){customShopItems=r.value;if(document.getElementById('shop').classList.contains('open'))renderShop()}
if(r.key==='shop_cleared'&&r.value){shopCleared=!!r.value.cleared;if(document.getElementById('shop').classList.contains('open'))renderShop()}
if(r.key==='recipe_edits'&&r.value){recipeEdits=r.value;renderRecipes()}
if(r.key==='user_recipes'&&Array.isArray(r.value)){userRecipes=r.value;renderRecipes()}
}).subscribe();

// --- Tabs ---
function switchTab(t){
document.querySelectorAll('.tab').forEach(function(el){el.classList.toggle('active',el.textContent.indexOf(t==='plan'?'Plan':'Przepisy')>=0)});
document.getElementById('planView').classList.toggle('active',t==='plan');
document.getElementById('recipesView').classList.toggle('active',t==='recipes');
document.getElementById('fabAdd').classList.toggle('show',t==='recipes');
document.querySelector('.fab-group').style.display=t==='plan'?'flex':'none';
document.querySelector('.target').style.display=t==='plan'?'block':'none';

}

// --- Recipe helpers ---
function getAllRecipes(){
var all=RECIPES.map(function(r){
var e=recipeEdits[r[0]]||{};
return{id:r[0],name:e.name||r[1],slot:r[2],m:[e.kcal||r[3],e.protein||r[4],e.carbs||r[5],e.fat||r[6]],
ing:e.ing||r[7]||[],notes:e.notes!=null?e.notes:(r[8]||''),tags:e.tags||r[9]||[],src:'base'};
});
userRecipes.forEach(function(r){all.push(Object.assign({src:'user'},r))});
return all;
}
function slotLabel(s){return{b:'🥣 Śniadanie',sb:'🥞 II śniadanie',d:'🍲 Obiad',s:'🥗 Kolacja',p:'🥜 Przekąska'}[s]||s}

// --- Recipe list ---
function filterRecipes(f){
rFilter=f;
document.querySelectorAll('.r-filter button').forEach(function(b,i){
b.classList.toggle('active',['all','b','sb','d','s'][i]===f);
});
renderRecipes();
}
function renderRecipes(){
var all=getAllRecipes().filter(function(r){return rFilter==='all'||r.slot===rFilter});
all.sort(function(a,b){return a.name.localeCompare(b.name,'pl')});
var h='';
all.forEach(function(r){
var tags=(r.tags||[]).map(function(t){return'<span class="r-tag">'+t+'</span>'}).join('');
h+='<div class="r-card" onclick="openRecipeDetail(\''+r.id+'\')"><div class="r-name">'+(r.src==='user'?'✏️ ':'')+r.name+'</div><div class="r-meta">'+slotLabel(r.slot)+' · '+r.m[0]+' kcal · B:'+r.m[1]+'g W:'+r.m[2]+'g T:'+r.m[3]+'g</div>'+(tags?'<div class="r-tags">'+tags+'</div>':'')+'</div>';
});
if(!h)h='<div style="color:#666;text-align:center;padding:20px">Brak przepisów</div>';
document.getElementById('rList').innerHTML=h;
}

// --- Recipe detail ---
function openRecipeDetail(id){
var r=getAllRecipes().find(function(x){return x.id===id});
if(!r)return;
var ingH='';
(r.ing||[]).forEach(function(i){
ingH+='<div class="r-ing-item">'+i.item+(i.amount_g?' — '+i.amount_g+'g':'')+(i.amount?' — '+i.amount:'')+(i.lidl_package?' <span style="color:#555">('+i.lidl_package+')</span>':'')+'</div>';

var el=document.getElementById('rDetail');
el.innerHTML='<div class="shop-head"><h3>'+r.name+'</h3><button class="shop-close" onclick="closeRecipeDetail()">✕</button></div>'+

'<div class="r-macros">'+['kcal','białko','węgle','tłuszcz'].map(function(l,i){return'<div class="macro"><span class="val">'+r.m[i]+'</span><span class="lbl">'+l+'</span></div>'}).join('')+'</div>'+
(ingH?'<div class="r-section"><div class="r-section-title">Składniki</div>'+ingH+'</div>':'')+
(r.notes?'<div class="r-notes">'+r.notes+'</div>':'')+
(r.tags&&r.tags.length?'<div class="r-section"><div class="r-section-title">Tagi</div><div class="r-tags">'+r.tags.map(function(t){return'<span class="r-tag">'+t+'</span>'}).join('')+'</div></div>':'')+
'<button class="r-btn" onclick="openEditRecipe(\''+r.id+'\')">✏️ Edytuj</button>'+
(r.src==='user'?'<button class="r-btn danger" onclick="deleteRecipe(\''+r.id+'\')">🗑️ Usuń</button>':'');

function closeRecipeDetail(){document.getElementById('rDetail').classList.remove('open')}

// --- Edit recipe ---
function openEditRecipe(id){
var r=getAllRecipes().find(function(x){return x.id===id});
if(!r)return;
var ingRows='';
(r.ing||[]).forEach(function(ig,i){
ingRows+='<div class="r-row"><input name="ei_item_'+i+'" value="'+ig.item+'"><input name="ei_amt_'+i+'" value="'+(ig.amount_g||ig.amount||'')+'" placeholder="ilość" style="max-width:80px"><button type="button" class="p-del" onclick="this.parentElement.remove();calcEditMacros()">✕</button></div>';
});
var el=document.getElementById('rDetail');
el.innerHTML='<div class="shop-head"><h3>Edytuj: '+r.name+'</h3><button class="shop-close" onclick="closeRecipeDetail()">✕</button></div>'+
'<form class="r-edit-form" onsubmit="return saveEditRecipe(\''+r.id+'\',this)">'+
'<input name="name" value="'+r.name+'" placeholder="Nazwa">'+
'<div class="r-row"><select name="slot"><option value="b"'+(r.slot==='b'?' selected':'')+'>Śniadanie</option><option value="sb"'+(r.slot==='sb'?' selected':'')+'>II śniadanie</option><option value="d"'+(r.slot==='d'?' selected':'')+'>Obiad</option><option value="s"'+(r.slot==='s'?' selected':'')+'>Kolacja</option><option value="p"'+(r.slot==='p'?' selected':'')+'>Przekąska</option></select></div>'+
'<div class="r-section"><div class="r-section-title">Składniki <button type="button" style="background:#2d6a4f;color:#fff;border:none;border-radius:4px;padding:2px 8px;font-size:.8em;cursor:pointer" onclick="addIngRow(this)">+ dodaj</button></div>'+
'<div id="editIngs">'+ingRows+'</div></div>'+
'<div class="r-calc" id="editCalc">Przelicz makra z składników ↓</div>'+
'<button type="button" class="r-btn secondary" onclick="calcEditMacros()">🔄 Przelicz makra</button>'+
'<div class="r-section"><div class="r-section-title">Makra per serving (lub ręcznie)</div>'+
'<div class="r-row"><input name="kcal" value="'+r.m[0]+'" placeholder="kcal" type="number"><input name="protein" value="'+r.m[1]+'" placeholder="białko" type="number"><input name="carbs" value="'+r.m[2]+'" placeholder="węgle" type="number"><input name="fat" value="'+r.m[3]+'" placeholder="tłuszcz" type="number"></div>'+
'<input name="servings" value="'+(r.servings||2)+'" placeholder="porcje" type="number" style="max-width:120px"></div>'+
'<textarea name="notes" placeholder="Notatki">'+(r.notes||'')+'</textarea>'+
'<input name="tags" value="'+(r.tags||[]).join(', ')+'" placeholder="Tagi (po przecinku)">'+
'<button type="submit" class="r-btn">💾 Zapisz</button></form>';
el.classList.add('open');
}
function addIngRow(btn){
var c=document.getElementById('editIngs'),i=c.children.length;
c.insertAdjacentHTML('beforeend','<div class="r-row"><input name="ei_item_'+i+'" placeholder="składnik"><input name="ei_amt_'+i+'" placeholder="ilość (g)" style="max-width:80px"><button type="button" class="p-del" onclick="this.parentElement.remove();calcEditMacros()">✕</button></div>');
}
function calcEditMacros(){
var rows=document.querySelectorAll('#editIngs .r-row'),tot=[0,0,0,0];
rows.forEach(function(row){
var inputs=row.querySelectorAll('input');
var item=(inputs[0].value||'').toLowerCase().trim();
var amt=parseFloat(inputs[1].value)||0;
var n=NUT[item];
if(n&&amt>0){
var f=amt/100;
tot[0]+=Math.round(n[0]*f);tot[1]+=Math.round(n[1]*f);
tot[2]+=Math.round(n[2]*f);tot[3]+=Math.round(n[3]*f);
}
});
var serv=parseInt(document.querySelector('input[name=servings]').value)||2;
var ps=[Math.round(tot[0]/serv),Math.round(tot[1]/serv),Math.round(tot[2]/serv),Math.round(tot[3]/serv)];
document.getElementById('editCalc').innerHTML='Suma: <b>'+tot[0]+'</b> kcal · B:'+tot[1]+'g · W:'+tot[2]+'g · T:'+tot[3]+'g<br>Per serving (÷'+serv+'): <b>'+ps[0]+'</b> kcal · B:'+ps[1]+'g · W:'+ps[2]+'g · T:'+ps[3]+'g';
document.querySelector('input[name=kcal]').value=ps[0];
document.querySelector('input[name=protein]').value=ps[1];
document.querySelector('input[name=carbs]').value=ps[2];
document.querySelector('input[name=fat]').value=ps[3];
}
function saveEditRecipe(id,form){
var d=new FormData(form);
var ing=[];
document.querySelectorAll('#editIngs .r-row').forEach(function(row){
var inputs=row.querySelectorAll('input');
if(inputs[0].value.trim())ing.push({item:inputs[0].value.trim(),amount_g:inputs[1].value.trim()});
});
var tags=d.get('tags').split(',').map(function(t){return t.trim()}).filter(Boolean);
var edit={name:d.get('name'),kcal:+d.get('kcal'),protein:+d.get('protein'),carbs:+d.get('carbs'),fat:+d.get('fat'),
ing:ing,notes:d.get('notes'),tags:tags,servings:+d.get('servings'),slot:d.get('slot')};
// Check if user recipe
var ur=userRecipes.find(function(r){return r.id===id});
if(ur){
Object.assign(ur,{name:edit.name,slot:edit.slot,m:[edit.kcal,edit.protein,edit.carbs,edit.fat],
ing:edit.ing,notes:edit.notes,tags:edit.tags,servings:edit.servings});
saveState('user_recipes',userRecipes);
}else{
recipeEdits[id]=edit;
saveState('recipe_edits',recipeEdits);
}
closeRecipeDetail();renderRecipes();return false;
}

'<div id="editIngs"><div class="r-row"><input name="ei_item_0" placeholder="składnik"><input name="ei_amt_0" placeholder="ilość (g)" style="max-width:80px"><button type="button" class="p-del" onclick="this.parentElement.remove()">✕</button></div></div></div>'+
'<div class="r-calc" id="editCalc">Dodaj składniki i przelicz ↓</div>'+
'<button type="button" class="r-btn secondary" onclick="calcEditMacros()">🔄 Przelicz makra</button>'+
'<div class="r-section"><div class="r-section-title">Makra per serving</div>'+
'<div class="r-row"><input name="kcal" placeholder="kcal" type="number" required><input name="protein" placeholder="białko" type="number" required><input name="carbs" placeholder="węgle" type="number" required><input name="fat" placeholder="tłuszcz" type="number" required></div>'+
'<input name="servings" value="2" placeholder="porcje" type="number" style="max-width:120px"></div>'+
'<textarea name="notes" placeholder="Notatki"></textarea>'+
'<input name="tags" placeholder="Tagi (po przecinku)">'+
'<button type="submit" class="r-btn">💾 Dodaj przepis</button></form>';
el.classList.add('open');
}
function saveNewRecipe(form){
var d=new FormData(form);
var ing=[];
document.querySelectorAll('#editIngs .r-row').forEach(function(row){
var inputs=row.querySelectorAll('input');
if(inputs[0].value.trim())ing.push({item:inputs[0].value.trim(),amount_g:inputs[1].value.trim()});
});
var tags=d.get('tags').split(',').map(function(t){return t.trim()}).filter(Boolean);
var id='user-'+Date.now();
userRecipes.push({id:id,name:d.get('name'),slot:d.get('slot'),
m:[+d.get('kcal'),+d.get('protein'),+d.get('carbs'),+d.get('fat')],
ing:ing,notes:d.get('notes'),tags:tags,servings:+d.get('servings')});
saveState('user_recipes',userRecipes);
closeRecipeDetail();renderRecipes();return false;
}
function deleteRecipe(id){
if(!confirm('Usunąć przepis?'))return;
userRecipes=userRecipes.filter(function(r){return r.id!==id});
saveState('user_recipes',userRecipes);
closeRecipeDetail();renderRecipes();
}

// --- Init ---
loadState();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script>
